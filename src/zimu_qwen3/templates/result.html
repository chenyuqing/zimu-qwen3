<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>转录结果 - Zimu Qwen3</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 1200px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        .stats { background: #f5f5f5; padding: 15px; border-radius: 4px; margin: 20px 0; }
        .stats span { margin-right: 20px; }
        .download { background: #28a745; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px; display: inline-block; margin: 10px 0; }
        .download:hover { background: #218838; }
        .segments { margin: 20px 0; }
        .segment { border-left: 3px solid #007bff; padding: 10px 15px; margin: 10px 0; background: #f9f9f9; }
        .segment .time { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>✅ 转录完成</h1>

    <div class="stats">
        <span>📄 文件: {{ filename }}</span>
        <span>⏱️ 时长: {{ duration }}s</span>
        <span>⚡ RTF: {{ rtf }}</span>
    </div>

    <a href="{{ download_url }}" class="download">⬇️ 下载 SRT 字幕</a>
    <a href="/" style="margin-left: 10px;">🔙 返回</a>

    <h2>字幕预览</h2>
    <div class="segments">
        {% for seg in segments %}
        <div class="segment">
            <div class="time">#{{ seg.index }} | {{ seg.start }}s - {{ seg.end }}s</div>
            <div>{{ seg.text }}</div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
